<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radha Counter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #D054FF, #5463FF);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        #counter {
            color: white;
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
            position: absolute;
            bottom: 20px;
        }
        .radha-name {
            color: white;
            font-size: 18px;
            position: absolute;
            bottom: -100px;
            animation: moveUp 10s linear;
        }
        @keyframes moveUp {
            0% { bottom: -100px; }
            100% { bottom: 100vh; }
        }
        #radhaButton {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background-color: #ff6347;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        #radhaButton:active {
            background-color: #ff0000;
        }
        #imageSetup {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            z-index: 100;
        }
        #imageSetupModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        #imageSetupModal .modal-content {
            background: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            height: 90%;
            overflow-y: scroll;
        }
        .mini-img-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            width: 100%;
        }
        .mini-img-container img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            position: relative;
        }
        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 12px;
            padding: 5px;
            cursor: pointer;
        }
        #imageSlideshow {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: -1;
    transition: background-image 1s ease-in-out;
}

.toggle{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:160px;
    height:55px;
    background:#999;
    border-radius:50px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.3s;
    overflow:hidden;
}

.circle{
    position:absolute;
    width:50px;
    height:50px;
    background:white;
    border-radius:50%;
    left:3px;
    transition:0.3s;
}

#toggleText{
    font-weight:bold;
    color:white;
    font-size:16px;
    letter-spacing:1px;
    z-index:2;
    user-select:none;
}

/* ----- BEST SLIDESHOW EFFECTS ----- */

/* 1) FADE */
.fade {
    animation: fadeAnim 10s ease-in-out;
}

@keyframes fadeAnim {
    0% { opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 1; }
}


/* 2) SLIDE LEFT */
.slideLeft {
    animation: slideLeftAnim 10s ease-in-out;
}
@keyframes slideLeftAnim {
    0% { transform: translateX(100%); opacity: 0; }
    30% { transform: translateX(0); opacity: 1; }
    70% { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(-100%); opacity: 0; }
}

/* 3) SLIDE RIGHT */
.slideRight {
    animation: slideRightAnim 10s ease-in-out;
}
@keyframes slideRightAnim {
    0% { transform: translateX(-100%); opacity: 0; }
    30% { transform: translateX(0); opacity: 1; }
    70% { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
}

/* 4) ZOOM IN */
.zoomIn {
    animation: zoomInAnim 10s ease-in-out;
}
@keyframes zoomInAnim {
    0% { transform: scale(1); opacity: 0; }
    30% { opacity: 1; }
    70% { transform: scale(1.1); opacity: 1; }
    100% { opacity: 0; }
}

/* 5) ZOOM OUT */
.zoomOut {
    animation: zoomOutAnim 10s ease-in-out;
}
@keyframes zoomOutAnim {
    0% { transform: scale(1.2); opacity: 0; }
    30% { transform: scale(1); opacity: 1; }
    70% { transform: scale(1); opacity: 1; }
    100% { opacity: 0; }
}

/* 6) ROTATE LEFT */
.rotateLeft {
    animation: rotateLeftAnim 10s ease-in-out;
}
@keyframes rotateLeftAnim {
    0% { transform: rotate(-45deg) scale(1); opacity: 0; }
    30% { transform: rotate(0deg) scale(1); opacity: 1; }
    70% { transform: rotate(0deg) scale(1); opacity: 1; }
    100% { transform: rotate(-45deg) scale(1); opacity: 0; }
}

/* 7) ROTATE RIGHT */
.rotateRight {
    animation: rotateRightAnim 10s ease-in-out;
}
@keyframes rotateRightAnim {
    0% { transform: rotate(45deg) scale(1); opacity: 0; }
    30% { transform: rotate(0deg) scale(1); opacity: 1; }
    70% { transform: rotate(0deg) scale(1); opacity: 1; }
    100% { transform: rotate(45deg) scale(1); opacity: 0; }
}

/* 8) BLUR IN/OUT */
.blurEffect {
    animation: blurAnim 10s ease-in-out;
}
@keyframes blurAnim {
    0% { filter: blur(10px); opacity: 0; }
    30% { filter: blur(0px); opacity: 1; }
    70% { filter: blur(0px); opacity: 1; }
    100% { filter: blur(10px); opacity: 0; }
}


        
        #okBtn {
            margin-top: 20px;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        #okBtn:active {
            background-color: #218838;
        }
        
        .blur-layer{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    filter:blur(12px) brightness(0.6);
    pointer-events:none;
}

.frame{
    position:fixed;
    width:800px;
    height:450px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    overflow:hidden;
    border:2px solid white;
}

.clear-layer{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    cursor:grab;
}

.controls{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}
        
       
        
    </style>
</head>
<body>


<div id="modeToggle" style="

right:57%;
transform:translateX(-50%);
display:flex;
align-items:center;
background:#ccc;
width:150px;
height:50px;

transition:0.3s;
">

border-radius:50%;

"></div>

<span id="toggleText" style="

">

</span>

</div>

<button id="openPage3Btn" 
style="
position:fixed;
top:20px;
right:20px;
background:transparent;
color:white;

font-size:18px;
cursor:pointer;
">
Set Images
</button>

    <div id="counter">Conting: 0</div>
    <button id="radhaButton">राधा</button>
    



        
<div id="page3" style="display:none; width:100%; height:100%; position:absolute; top:0; left:0; background:white; overflow-y:auto; text-align:center; padding-bottom:40px;">

    <div style="margin-top:20px; text-align:center;">
        <input type="file" id="imageInputPage3">
    </div>

    <div class="mini-img-container" id="miniImages"></div>
<button id="page3OkBtn" style="margin-top:20px;">OK</button>

</div>

<!-- Frame Editor Modal -->
<div id="frameModal" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffff;
display:none;
justify-content:center;
align-items:center;
z-index:5000;
flex-direction:column;
">

<img id="blurImage" class="blur-layer">

    <script>
      
      let isOnlineMode = false;

const modeToggle = document.getElementById("modeToggle");
const toggleCircle = document.getElementById("toggleCircle");
const toggleText = document.getElementById("toggleText");

modeToggle.addEventListener("click", () => {

    isOnlineMode = !isOnlineMode;

    if(isOnlineMode){
        modeToggle.style.background = "#4CAF50";
        toggleCircle.style.left = "107px";
        toggleText.innerText = "ONLINE";
    } else {
        modeToggle.style.background = "#999";
        toggleCircle.style.left = "3px";
        toggleText.innerText = "OFFLINE";
    }

});
      
      
      const imageInput = document.getElementById('imageInput');
      const blurImage = document.getElementById("blurImage");
const clearImage = document.getElementById("clearImage");
const frameModal = document.getElementById("frameModal");

let scale = 1;
let rotation = 0;
let posX = 0;
let posY = 0;
let dragging = false;
let startX, startY;
let selectedImage = null;
let editingIndex = null;



function resetTransform(){
    scale = 1;
    rotation = 0;
    posX = 0;
    posY = 0;
    updateTransform();
}

document.getElementById("openPage3Btn").onclick = () => {
    document.getElementById("page3").style.display = "block";
};

document.getElementById("zoomIn").onclick = () => {
    scale += 0.1;
    updateTransform();
};

document.getElementById("zoomOut").onclick = () => {
    if(scale > 0.2){
        scale -= 0.1;
        updateTransform();
    }
};

document.getElementById("rotate").onclick = () => {
    rotation += 90;
    updateTransform();
};

clearImage.addEventListener("mousedown", e=>{
    dragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
    clearImage.style.cursor="grabbing";
});

document.addEventListener("mouseup", ()=>{
    dragging = false;
    clearImage.style.cursor="grab";
});

document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    updateTransform();
});

function updateTransform(){
    const transform =
        `translate(-50%, -50%) translate(${posX}px, ${posY}px) scale(${scale}) rotate(${rotation}deg)`;
    
    clearImage.style.transform = transform;
}
      
        let count = localStorage.getItem('count') ? parseInt(localStorage.getItem('count')) : 0;
        let images = JSON.parse(localStorage.getItem('images')) || [];
      const miniImagesContainer = document.getElementById("miniImages");
        const counterElement = document.getElementById('counter');
        const radhaButton = document.getElementById('radhaButton');
        const imageSlideshow = document.getElementById('imageSlideshow');
     

        let draggingImage = null;
        

        



        function addMiniImages() {
            miniImagesContainer.innerHTML = ''; // Clear previous images
            images.forEach((imageSrc, index) => {
                let imgDiv = document.createElement('div');
                imgDiv.style.position = 'relative';
                let img = document.createElement('img');
                img.src = imageSrc;
                img.draggable = true;
                img.dataset.index = index;
                img.addEventListener('dragstart', dragStart);
                img.addEventListener('dragover', dragOver);
                img.addEventListener('drop', dropImage);
                img.addEventListener('dragend', dragEnd);

                let deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'X';
                deleteBtn.classList.add('delete-btn');
                deleteBtn.addEventListener('click', () => deleteImage(index));
                // 🔵 EDIT BUTTON
                let editBtn = document.createElement('button');
                editBtn.textContent = 'Edit';
                editBtn.style.background = 'blue';
                editBtn.style.color = 'white';
                editBtn.style.border = 'none';
                editBtn.style.padding = '5px 8px';
                editBtn.style.marginRight = '35px';
                editBtn.style.position = 'absolute';
                editBtn.style.top = '5px';
                editBtn.style.right = '35px';
                editBtn.style.cursor = 'pointer';
                
                editBtn.addEventListener('click', () => editImage(index));

                imgDiv.appendChild(img);
                imgDiv.appendChild(editBtn);
                imgDiv.appendChild(deleteBtn);
                miniImagesContainer.appendChild(imgDiv);
            });
        }

        function deleteImage(index) {
            images.splice(index, 1);
            localStorage.setItem('images', JSON.stringify(images));
            addMiniImages();
        }
        function editImage(index){

        selectedImage = images[index];
    
        blurImage.src = selectedImage;
        clearImage.src = selectedImage;
    
        editingIndex = index;   // important
    
        frameModal.style.display = "flex";
    
        resetTransform();
}

        function dragStart(e) {
            draggingImage = e.target;
            e.dataTransfer.setData('text/plain', e.target.dataset.index);
        }

        function dragOver(e) {
            e.preventDefault();
        }

        function dropImage(e) {
            e.preventDefault();
            if (draggingImage !== e.target) {
                let draggedIndex = draggingImage.dataset.index;
                let targetIndex = e.target.dataset.index;
                [images[draggedIndex], images[targetIndex]] = [images[targetIndex], images[draggedIndex]];
                localStorage.setItem('images', JSON.stringify(images));
                addMiniImages();
            }
        }

        function dragEnd() {
            draggingImage = null;
        }

        

        window.onload = () => {
            counterElement.textContent = `Conting: ${count}`;
            addMiniImages();
            
        };
        
        const imageInputPage3 = document.getElementById("imageInputPage3");

imageInputPage3.addEventListener("change", (e) => {

    if(!e.target.files.length) return;

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = () => {

        frameModal.style.display = "flex";

        blurImage.src = reader.result;
        clearImage.src = reader.result;
        selectedImage = reader.result;

        resetTransform();
    };

    reader.readAsDataURL(file);
});
        
        
    radhaButton.addEventListener('click', () => {
                      // 🔥 MODE CHECK
    if(isOnlineMode){
        startSlideshow();
    } else {
        startOfflineSlideshow();
    }

    count++;
    localStorage.setItem('count', count);
    counterElement.textContent = `Conting: ${count}`;

    // 🔹 2 Radha names create होंगे
    for (let i = 0; i < 2; i++) {

        let radhaName = document.createElement('div');
        radhaName.classList.add('radha-name');
        radhaName.textContent = 'राधा';

        // पहला white, दूसरा red
        radhaName.style.color = (i === 0) ? "white" : "red";

        const randomLeft = Math.random() * window.innerWidth;
        const randomDuration = Math.random() * 5 + 5;

        radhaName.style.left = `${randomLeft}px`;
        radhaName.style.animationDuration = `${randomDuration}s`;

        document.body.appendChild(radhaName);

        setTimeout(() => {
            radhaName.remove();
        }, randomDuration * 1000);
    }


    
});


// ===============================
// PIXABAY AUTO IMAGE SYSTEM
// ===============================

const API_KEY = "54738072-5c45c9ccb57150804452d4fbe";

let imagePool = [];
let slideshowInterval = null;
let currentPage = 1;
let slideshowRunning = false;

async function fetchImages() {
    try {
        // Only Radha Krishna specific terms for search
        const searchTerms = [
            "Radha Krishna",
                      
        ];

        // Randomly select one term from the search list
        const randomSearchTerm = "Radha Krishna divine art illustration";

        const response = await fetch(
            `https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(randomSearchTerm)}&image_type=illustration&orientation=vertical&per_page=20&page=${currentPage}&safesearch=true`
        );

        const data = await response.json();

        if (!data.hits || data.hits.length === 0) return;

        // Adding the fetched images to the pool
        data.hits.forEach(img => {
            if (!imagePool.includes(img.largeImageURL)) {
                imagePool.push(img.largeImageURL);
            }
        }); 

        // Increment page for pagination
        currentPage++;

    } catch (error) {
        console.log("Error fetching images:", error);
    }
}



        
        function getNextImage() {
    if (imagePool.length === 0) return null;

    const index = Math.floor(Math.random() * imagePool.length);
    return imagePool.splice(index, 1)[0]; // remove so no repeat
}

async function startSlideshow() {

    if (slideshowRunning) return;

    if (imagePool.length === 0) {
        await fetchImages();
    }

    slideshowRunning = true;

    slideshowInterval = setInterval(async () => {

        if (imagePool.length === 0) {
            await fetchImages();
        }

        const nextImage = getNextImage();
        if (!nextImage) return;

        imageSlideshow.style.backgroundImage = `url(${nextImage})`;

    }, 10000);
}




function startOfflineSlideshow() {

    if (images.length === 0) {
        alert("No offline images uploaded!");
        return;
    }

    if(slideshowInterval){
        clearInterval(slideshowInterval);
    }

    let index = 0;

    imageSlideshow.style.backgroundImage = `url(${images[0]})`;

    slideshowInterval = setInterval(() => {
        index = (index + 1) % images.length;
        imageSlideshow.style.backgroundImage = `url(${images[index]})`;
    }, 10000);
}


document.getElementById("frameOk").onclick = () => {

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const frameWidth = 850;
    const frameHeight = 450;

    canvas.width = frameWidth;
    canvas.height = frameHeight;

    const img = new Image();
    img.src = selectedImage;

    img.onload = function(){

    // Canvas setup
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const frameWidth = 800;
    const frameHeight = 450;

    canvas.width = frameWidth;
    canvas.height = frameHeight;

    // 🔥 1️⃣ BLUR BACKGROUND DRAW करो
    ctx.filter = "blur(20px)";
    ctx.drawImage(img, 0, 0, frameWidth, frameHeight);

    // filter reset
    ctx.filter = "none";

    // 🔥 2️⃣ CENTER IMAGE DRAW करो (crop वाला)
    ctx.save();
    ctx.translate(frameWidth/2, frameHeight/2);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.scale(scale, scale);

    ctx.drawImage(
        img,
        -img.width/2 + posX,
        -img.height/2 + posY
    );

    ctx.restore();

    const croppedImage = canvas.toDataURL();

    if(editingIndex !== null){
        images[editingIndex] = croppedImage;
        editingIndex = null;
    } else {
        images.push(croppedImage);
    }

    localStorage.setItem('images', JSON.stringify(images));

    addMiniImages();

    frameModal.style.display = "none";
    document.getElementById("page3").style.display = "block";
};
};

document.getElementById("page3OkBtn").onclick = () => {
    document.getElementById("page3").style.display = "none";
};

    </script>


</body>
